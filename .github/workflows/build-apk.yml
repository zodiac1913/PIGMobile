name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: ./pig_mobile
        run: flutter pub get

      - name: Build APK
        working-directory: ./pig_mobile       
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pig-mobile-apk
          path: pig_mobile/build/app/outputs/flutter-apk/app-debug.apk

